name: 农业AI每日论文推荐

on:
  schedule:
    # 每天北京时间 08:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

jobs:
  search-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run arXiv search
      run: |
        cd start-my-day/scripts
        python3 search_arxiv.py --top-n 15
      env:
        OBSIDIAN_VAULT_PATH: /tmp/obsidian-vault
        
    - name: Run journal search
      run: |
        python3 << 'PYEOF'
        import requests, json, time, os
        from datetime import datetime, timedelta

        JOURNALS = [
            "Computers and Electronics in Agriculture",
            "Precision Agriculture",
            "Agricultural and Forest Meteorology",
            "Remote Sensing of Environment"
        ]

        AGRI_KEYWORDS = [
            "agriculture", "crop", "precision agriculture", "smart farming",
            "deep learning", "machine learning", "computer vision",
            "UAV", "remote sensing", "yield prediction", "disease detection",
            "weed detection", "soil", "greenhouse", "hyperspectral",
            "multispectral", "non-destructive", "phenotyping"
        ]

        S2_URL = "https://api.semanticscholar.org/graph/v1/paper/search"
        FIELDS = "title,abstract,publicationDate,citationCount,url,authors,venue,externalIds"

        results = []
        seen = set()

        for journal in JOURNALS:
            print(f"🔍 {journal}")
            for q in AGRI_KEYWORDS[:6]:
                params = {
                    "query": q,
                    "fields": FIELDS,
                    "limit": 5,
                    "year": "2025-2026",
                    "venue": journal
                }
                try:
                    resp = requests.get(S2_URL, params=params, timeout=15)
                    if resp.status_code == 200:
                        data = resp.json()
                        for p in data.get("data", []):
                            t = p.get("title", "")
                            if t not in seen:
                                seen.add(t)
                                results.append({
                                    "title": t,
                                    "authors": [a.get("name","") for a in p.get("authors",[])[:3]],
                                    "abstract": (p.get("abstract") or "")[:300],
                                    "url": p.get("url", ""),
                                    "citationCount": p.get("citationCount", 0),
                                    "venue": p.get("venue", journal),
                                    "publicationDate": p.get("publicationDate", ""),
                                    "source": "journal",
                                    "doi": (p.get("externalIds") or {}).get("DOI", "")
                                })
                    time.sleep(1.2)
                except Exception as e:
                    print(f"  ⚠️ {e}")
                    time.sleep(2)

        results.sort(key=lambda x: x.get("citationCount", 0), reverse=True)
        with open("/tmp/journal_papers.json", "w", encoding="utf-8") as f:
            json.dump(results[:10], f, ensure_ascii=False, indent=2)
        print(f"📊 期刊论文: {len(results[:10])} 篇")
        PYEOF
        
    - name: Send to Feishu
      run: |
        python3 << 'PYEOF'
        import json, requests, os
        from datetime import datetime

        WEBHOOK_URL = os.environ.get('FEISHU_WEBHOOK')
        if not WEBHOOK_URL:
            print("⚠️ 未配置 FEISHU_WEBHOOK")
            exit(0)

        # 读取期刊论文
        try:
            with open("/tmp/journal_papers.json", "r") as f:
                journal_papers = json.load(f)
        except:
            journal_papers = []

        # 读取 arXiv 论文
        try:
            with open("/tmp/obsidian-vault/10_Daily/papers_" + datetime.now().strftime("%Y-%m-%d") + ".json", "r") as f:
                data = json.load(f)
                arxiv_papers = data.get("papers", [])[:10]
        except:
            arxiv_papers = []

        def build_card():
            elements = []
            date_str = datetime.now().strftime("%Y-%m-%d")
            
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"**📚 农业AI每日论文推荐**\n📅 {date_str}"}
            })
            elements.append({"tag": "hr"})
            
            # 期刊论文
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": "**📖 期刊论文 (Semantic Scholar)**\n来源：Computers and Electronics in Agriculture / Precision Agriculture / Agricultural and Forest Meteorology / Remote Sensing of Environment"}
            })
            
            for i, p in enumerate(journal_papers[:5], 1):
                authors = ", ".join(p["authors"][:2]) + (" 等" if len(p["authors"]) > 2 else "")
                doi = p.get("doi", "")
                link = f"https://doi.org/{doi}" if doi else p.get("url", "")
                link_md = f"[{p['title'][:55]}{'...' if len(p['title'])>55 else ''}]({link})" if link else f"**{p['title'][:55]}**"
                elements.append({
                    "tag": "div",
                    "text": {"tag": "lark_md", "content": f"**{i}.** {link_md}\n👤 {authors} | 📰 {p['venue']} | 📅 {p.get('publicationDate','')} | 📊 引用: {p.get('citationCount',0)}"}
                })
            
            elements.append({"tag": "hr"})
            
            # arXiv 论文
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": "**📄 arXiv 预印本论文**\n来源：arXiv (AI/ML/CV/RO 最新预印本)"}
            })
            
            for i, p in enumerate(arxiv_papers[:5], 1):
                authors = ", ".join(p.get("authors", [])[:2]) + (" 等" if len(p.get("authors",[])) > 2 else "")
                arxiv_id = p.get("id", "").split("/")[-1]
                url = p.get("url", "")
                domain = p.get("matched_domain", "")
                scores = p.get("scores", {})
                score = scores.get("recommendation", 0)
                link_md = f"[{p.get('title','')[:50]}{'...' if len(p.get('title',''))>50 else ''}]({url})" if url else f"**{p.get('title','')[:50]}**"
                elements.append({
                    "tag": "div",
                    "text": {"tag": "lark_md", "content": f"**{i}.** {link_md}\n👤 {authors} | 🏷️ {domain} | ⭐ {score:.1f} | 🆔 {arxiv_id}"}
                })
            
            elements.append({"tag": "hr"})
            total = len(journal_papers) + len(arxiv_papers)
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"📊 **今日推荐统计：** 期刊 {len(journal_papers)} 篇 + arXiv {len(arxiv_papers)} 篇 = 共 {total} 篇\n\n💡 *由 evil-read-arxiv 自动生成*"}
            })
            
            return {
                "config": {"wide_screen_mode": True},
                "header": {"title": {"tag": "plain_text", "content": "🌾 农业AI每日论文速递"}, "template": "green"},
                "elements": elements
            }

        card = build_card()
        payload = {"msg_type": "interactive", "card": card}
        resp = requests.post(WEBHOOK_URL, json=payload, timeout=10)
        result = resp.json()
        
        if result.get("code") == 0:
            print("✅ 飞书推送成功！")
        else:
            print(f"⚠️ 推送返回: {json.dumps(result, ensure_ascii=False)}")
        PYEOF
