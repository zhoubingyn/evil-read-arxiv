name: 农业AI每日论文推荐

on:
  schedule:
    # 每天北京时间 06:40 (UTC 22:40)
    - cron: '40 22 * * *'
  workflow_dispatch:

env:
  FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

jobs:
  search-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run arXiv search
      run: |
        cd start-my-day/scripts
        python3 search_arxiv.py --top-n 50
      env:
        OBSIDIAN_VAULT_PATH: /tmp/obsidian-vault
        
    - name: Run journal search
      run: |
        python3 << 'PYEOF'
        import requests, json, time, os
        from datetime import datetime, timedelta

        JOURNALS = [
            "Computers and Electronics in Agriculture",
            "Precision Agriculture",
            "Agricultural and Forest Meteorology",
            "Remote Sensing of Environment",
            "Food Chemistry",
            "Artificial Intelligence in Agriculture",
            "Biosystems Engineering",
            "ISPRS Journal of Photogrammetry and Remote Sensing",
            "Journal of Integrative Agriculture",
            "Plant Phenomics",
            "Postharvest Biology and Technology"
        ]

        AGRI_KEYWORDS = [
            "agriculture", "crop", "precision agriculture", "smart farming",
            "deep learning", "machine learning", "computer vision",
            "UAV", "remote sensing", "yield prediction", "disease detection",
            "weed detection", "soil", "greenhouse", "hyperspectral",
            "multispectral", "non-destructive", "phenotyping"
        ]

        S2_URL = "https://api.semanticscholar.org/graph/v1/paper/search"
        FIELDS = "title,abstract,publicationDate,citationCount,url,authors,venue,externalIds"

        results = []
        seen = set()

        for journal in JOURNALS:
            print(f"🔍 {journal}")
            for q in AGRI_KEYWORDS[:4]:
                params = {
                    "query": q,
                    "fields": FIELDS,
                    "limit": 5,
                    "year": "2025-2026",
                    "venue": journal
                }
                try:
                    resp = requests.get(S2_URL, params=params, timeout=15)
                    if resp.status_code == 200:
                        data = resp.json()
                        for p in data.get("data", []):
                            t = p.get("title", "")
                            if t not in seen:
                                seen.add(t)
                                results.append({
                                    "title": t,
                                    "authors": [a.get("name","") for a in p.get("authors",[])[:3]],
                                    "abstract": (p.get("abstract") or "")[:300],
                                    "url": p.get("url", ""),
                                    "citationCount": p.get("citationCount", 0),
                                    "venue": p.get("venue", journal),
                                    "publicationDate": p.get("publicationDate", ""),
                                    "source": "journal",
                                    "doi": (p.get("externalIds") or {}).get("DOI", "")
                                })
                    time.sleep(1.2)
                except Exception as e:
                    print(f"  ⚠️ {e}")
                    time.sleep(2)

        results.sort(key=lambda x: x.get("citationCount", 0), reverse=True)
        with open("/tmp/journal_papers.json", "w", encoding="utf-8") as f:
            json.dump(results[:20], f, ensure_ascii=False, indent=2)
        print(f"📊 期刊论文: {len(results[:20])} 篇")
        PYEOF
        
    - name: Send to Feishu
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        BAIDU_TRANS_APPID: ${{ secrets.BAIDU_TRANS_APPID }}
        BAIDU_TRANS_SECRET: ${{ secrets.BAIDU_TRANS_SECRET }}
      run: |
        python3 << 'PYEOF'
        import json, requests, os, hashlib, time, random
        from datetime import datetime

        WEBHOOK_URL = os.environ.get('FEISHU_WEBHOOK')
        if not WEBHOOK_URL:
            print("⚠️ 未配置 FEISHU_WEBHOOK")
            exit(0)

        # ========== 百度翻译 ==========
        BAIDU_APPID = os.environ.get('BAIDU_TRANS_APPID', '')
        BAIDU_SECRET = os.environ.get('BAIDU_TRANS_SECRET', '')
        baidu_available = bool(BAIDU_APPID and BAIDU_SECRET)
        if baidu_available:
            print("✅ 使用百度翻译 API")
        else:
            print("⚠️ 未配置百度翻译，标题保持英文")

        def baidu_translate(text, appid, secret):
            """百度翻译API"""
            salt = str(random.randint(32768, 65536))
            sign_str = appid + text + salt + secret
            sign = hashlib.md5(sign_str.encode('utf-8')).hexdigest()
            url = "https://fanyi-api.baidu.com/api/trans/vip/translate"
            params = {
                "q": text, "from": "en", "to": "zh",
                "appid": appid, "salt": salt, "sign": sign
            }
            try:
                resp = requests.get(url, params=params, timeout=10)
                result = resp.json()
                if "trans_result" in result:
                    return result["trans_result"][0]["dst"]
            except:
                pass
            return text

        def translate_titles(papers, title_key="title"):
            """批量翻译论文标题"""
            if not baidu_available:
                return papers
            for p in papers:
                title = p.get(title_key, "")
                if title and len(title) > 5:
                    p["title_zh"] = baidu_translate(title, BAIDU_APPID, BAIDU_SECRET)
                    time.sleep(0.3)  # 避免频率限制
                else:
                    p["title_zh"] = title
            return papers

        # 读取期刊论文
        try:
            with open("/tmp/journal_papers.json", "r") as f:
                journal_papers = json.load(f)
        except:
            journal_papers = []

        # 读取 arXiv 论文
        try:
            with open("/tmp/obsidian-vault/10_Daily/papers_" + datetime.now().strftime("%Y-%m-%d") + ".json", "r") as f:
                data = json.load(f)
                arxiv_papers = data.get("papers", [])[:10]
        except:
            arxiv_papers = []

        # 翻译标题
        print("🌐 正在翻译期刊论文标题...")
        journal_papers = translate_titles(journal_papers)
        print("🌐 正在翻译 arXiv 论文标题...")
        arxiv_papers = translate_titles(arxiv_papers)

        def build_card():
            elements = []
            date_str = datetime.now().strftime("%Y-%m-%d")
            
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"**📚 农业AI每日论文推荐**\n📅 {date_str}"}
            })
            elements.append({"tag": "hr"})
            
            # 期刊论文
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": "**📖 期刊论文 (Semantic Scholar)**\n来源：Computers and Electronics in Agriculture / Precision Agriculture / Agricultural and Forest Meteorology / Remote Sensing of Environment"}
            })
            
            for i, p in enumerate(journal_papers[:20], 1):
                authors = ", ".join(p["authors"][:2]) + (" 等" if len(p["authors"]) > 2 else "")
                doi = p.get("doi", "")
                link = f"https://doi.org/{doi}" if doi else p.get("url", "")
                title_zh = p.get("title_zh", p["title"])
                title_en = p["title"]
                link_md = f"[{title_zh}]({link})" if link else f"**{title_zh}**"
                elements.append({
                    "tag": "div",
                    "text": {"tag": "lark_md", "content": f"**{i}.** {link_md}\n*{title_en[:80]}{'...' if len(title_en)>80 else ''}*\n👤 {authors} | 📰 {p['venue']} | 📅 {p.get('publicationDate','')} | 📊 引用: {p.get('citationCount',0)}"}
                })
            
            elements.append({"tag": "hr"})
            
            # arXiv 论文
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": "**📄 arXiv 预印本论文**\n来源：arXiv (AI/ML/CV/RO 最新预印本)"}
            })
            
            for i, p in enumerate(arxiv_papers[:10], 1):
                authors = ", ".join(p.get("authors", [])[:2]) + (" 等" if len(p.get("authors",[])) > 2 else "")
                arxiv_id = p.get("id", "").split("/")[-1]
                url = p.get("url", "")
                domain = p.get("matched_domain", "")
                scores = p.get("scores", {})
                score = scores.get("recommendation", 0)
                title_zh = p.get("title_zh", p.get("title", ""))
                title_en = p.get("title", "")
                link_md = f"[{title_zh}]({url})" if url else f"**{title_zh}**"
                elements.append({
                    "tag": "div",
                    "text": {"tag": "lark_md", "content": f"**{i}.** {link_md}\n*{title_en[:70]}{'...' if len(title_en)>70 else ''}*\n👤 {authors} | 🏷️ {domain} | ⭐ {score:.1f} | 🆔 {arxiv_id}"}
                })
            
            elements.append({"tag": "hr"})
            total = len(journal_papers) + len(arxiv_papers)
            elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"📊 **今日推荐统计：** 期刊 {len(journal_papers)} 篇 + arXiv {len(arxiv_papers)} 篇 = 共 {total} 篇\n\n💡 *由 evil-read-arxiv 自动生成*"}
            })
            
            return {
                "config": {"wide_screen_mode": True},
                "header": {"title": {"tag": "plain_text", "content": "🌾 农业AI每日论文速递"}, "template": "green"},
                "elements": elements
            }

        card = build_card()
        payload = {"msg_type": "interactive", "card": card}
        resp = requests.post(WEBHOOK_URL, json=payload, timeout=10)
        result = resp.json()
        
        if result.get("code") == 0:
            print("✅ 飞书推送成功！")
        else:
            print(f"⚠️ 推送返回: {json.dumps(result, ensure_ascii=False)}")
        PYEOF
